<!DOCTYPE html>
<html>
<head>
  <title>CoolGuys Tasks</title>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      color: white;
      background: linear-gradient(120deg, #111, #000, #111);
      background-size: 300% 300%;
      animation: bgMove 10s infinite;
      overflow: hidden;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      background: linear-gradient(90deg,#00f2ff,#ff00c8);
      color: white;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover { transform: scale(1.1); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .trash { color: #bbb; filter: blur(1px); }
    .flies::after { content: " 🪰"; }

    .heaven {
      color: gold;
      text-shadow: 0 0 10px gold, 0 0 20px white;
    }

    hr {
      width: 60%;
      margin: 30px auto;
      border: 1px solid #444;
    }

    /* ===== NEW GAME UI ===== */

    #gameArea {
      position: relative;
      width: 800px;
      height: 450px;
      margin: 20px auto;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      overflow: hidden;
      display: none;
      box-shadow: 0 0 40px rgba(0,255,255,0.3);
    }

    .cop {
      position: absolute;
      width: 28px;
      height: 28px;
      background: red;
      border-radius: 50%;
      box-shadow: 0 0 15px red;
    }

    .stunned {
      background: cyan !important;
      box-shadow: 0 0 20px cyan;
    }

    .defuseBtn {
      position: absolute;
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      background: linear-gradient(90deg,#00f2ff,#ff00c8);
      color: white;
      cursor: pointer;
    }

    #timer {
      font-size: 20px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h2>Task 1: Gamble (1/500 Chance)</h2>
  <button id="btn1" onclick="task1()">Gamble</button>
  <div id="result"></div>

  <hr>

  <h2>Task 2: Ecsape ICE ”</h2>
  <button id="startBtn" onclick="startGame()">Start</button>
  <div id="timer"></div>
  <div id="aiResult"></div>
  <div id="gameArea"></div>

<script>

/* ===== 24 HOUR KEY SYSTEM ===== */

function getCookie(name) {
  let match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
  return match ? match[2] : null;
}

function setCookie(name, value, hours) {
  let d = new Date();
  d.setTime(d.getTime() + (hours*60*60*1000));
  document.cookie = `${name}=${value}; expires=${d.toUTCString()}; path=/; SameSite=Lax`;
}

let existingKey = getCookie("vaultKey");
if (!existingKey) {
  let newKey = Math.floor(Math.random() * 100000) + 1;
  setCookie("vaultKey", newKey, 24);
}

/* ---------------- TASK 1 ---------------- */

let t1Cooldown = false;

function task1() {
  if (t1Cooldown) return;

  t1Cooldown = true;
  let btn = document.getElementById("btn1");
  let result = document.getElementById("result");

  btn.disabled = true;
  btn.innerText = "Wait 1s";

  setTimeout(() => {
    btn.disabled = false;
    btn.innerText = "Gamble";
    t1Cooldown = false;
  }, 1000);

  let roll = Math.floor(Math.random() * 500) + 1;

  if (roll === 1) {
    let key = getCookie("vaultKey");
    result.className = "heaven";
    result.innerText = `✨ YOU GOT THE KEY! (${key}) ✨`;
  } else {
    result.className = "trash flies";
    result.innerText = "💩 Trash… try again";
  }
}

/* ---------------- TASK 2 ---------------- */

let bombTime = 120;
let gameActive = false;
let cops = [];
let timerInterval;
let spawnInterval;
let cooldownKey = "vaultCooldown";

let lastMX = 0;
let lastMY = 0;
let invincibleUntil = 0;

function startGame() {
  let cooldown = localStorage.getItem(cooldownKey);
  if (cooldown && Date.now() < cooldown) {
    document.getElementById("aiResult").innerText =
      "⏳ Wait before retrying!";
    return;
  }

  gameActive = true;
  bombTime = 120;
  cops = [];

  let area = document.getElementById("gameArea");
  area.innerHTML = "";
  area.style.display = "block";

  timerInterval = setInterval(() => {
    bombTime--;
    document.getElementById("timer").innerText = "Time: " + bombTime;

    if (bombTime <= 0) winGame();
  }, 1000);

  spawnInterval = setInterval(spawnCop, 9000); // faster spawn
  spawnDefuse();
}

function spawnCop() {
  if (!gameActive) return;

  let area = document.getElementById("gameArea");
  let cop = document.createElement("div");
  cop.className = "cop";
  cop.style.left = Math.random() * 760 + "px";
  cop.style.top = Math.random() * 410 + "px";
  area.appendChild(cop);

  cops.push({
    el: cop,
    stunned: false,
    stunUntil: 0,
    spawnTime: Date.now()
  });
}

document.addEventListener("mousemove", e => {
  if (!gameActive) return;

  const area = document.getElementById("gameArea");
  const rect = area.getBoundingClientRect();

  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const now = Date.now();
  const moveSpeed = Math.hypot(mx - lastMX, my - lastMY);

  cops.forEach(c => {

    // 0.3s spawn protection
    if (now - c.spawnTime < 300) return;

    if (c.stunned && now > c.stunUntil) {
      c.stunned = false;
      c.el.classList.remove("stunned");
    }

    const cx = c.el.offsetLeft + 14;
    const cy = c.el.offsetTop + 14;

    const dx = mx - cx;
    const dy = my - cy;
    const dist = Math.hypot(dx, dy);

    const copRadius = 14;
    const playerRadius = 6;

    if (dist < copRadius + playerRadius && now > invincibleUntil) {
      loseGame();
      return;
    }

    // fast juke required
    if (!c.stunned && dist < 50 && moveSpeed > 30) {
      c.stunned = true;
      c.stunUntil = now + 1500;
      c.el.classList.add("stunned");
      invincibleUntil = now + 300;
    }

    if (!c.stunned) {

      // speed scales up slowly
      let baseSpeed = 2.6;
      let difficultyBoost = (120 - bombTime) * 0.015;
      let speed = baseSpeed + difficultyBoost;

      if (dist > 0) {
        c.el.style.left =
          c.el.offsetLeft + (dx / dist) * speed + "px";
        c.el.style.top =
          c.el.offsetTop + (dy / dist) * speed + "px";
      }
    }
  });

  lastMX = mx;
  lastMY = my;
});

function spawnDefuse() {
  if (!gameActive) return;

  let area = document.getElementById("gameArea");
  let btn = document.createElement("button");
  btn.className = "defuseBtn";
  btn.innerText = "DEFUSE";
  btn.style.left = Math.random() * 700 + "px";
  btn.style.top = Math.random() * 350 + "px";
  area.appendChild(btn);

  let timeout = setTimeout(() => {
    resetGame("💥 You hesitated!");
  }, 5000);

  btn.onclick = () => {
    clearTimeout(timeout);
    btn.remove();
    setTimeout(spawnDefuse, 2000);
  };
}

function winGame() {
  let key = getCookie("vaultKey");
  resetCore();
  document.getElementById("aiResult").innerText =
    "🌟 Vault Opened! KEY: " + key;
}

function loseGame() {
  localStorage.setItem(cooldownKey, Date.now() + 60000);
  resetGame("👮 Caught! 1 minute cooldown.");
}

function resetGame(msg) {
  resetCore();
  document.getElementById("aiResult").innerText = msg;
}

function resetCore() {
  gameActive = false;
  clearInterval(timerInterval);
  clearInterval(spawnInterval);
  document.getElementById("gameArea").style.display = "none";
  document.getElementById("gameArea").innerHTML = "";
  document.getElementById("timer").innerText = "";
}

</script>

</body>
</html>
