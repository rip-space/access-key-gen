<!DOCTYPE html>
<html>
<head>
  <title>CoolGuys Tasks</title>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      color: white;
      background: linear-gradient(120deg, #111, #000, #111);
      background-size: 300% 300%;
      animation: bgMove 10s infinite;
      overflow: hidden;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      background: linear-gradient(90deg,#00f2ff,#ff00c8);
      color: white;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover { transform: scale(1.1); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .trash { color: #bbb; filter: blur(1px); }
    .flies::after { content: " 🪰"; }

    .heaven {
      color: gold;
      text-shadow: 0 0 10px gold, 0 0 20px white;
    }

    hr {
      width: 60%;
      margin: 30px auto;
      border: 1px solid #444;
    }

    /* ===== NEW GAME UI ===== */

    #gameArea {
      position: relative;
      width: 800px;
      height: 450px;
      margin: 20px auto;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      overflow: hidden;
      display: none;
      box-shadow: 0 0 40px rgba(0,255,255,0.3);
    }

    .cop {
      position: absolute;
      width: 28px;
      height: 28px;
      background: red;
      border-radius: 50%;
      box-shadow: 0 0 15px red;
    }

    .stunned {
      background: cyan !important;
      box-shadow: 0 0 20px cyan;
    }

    .defuseBtn {
      position: absolute;
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      background: linear-gradient(90deg,#00f2ff,#ff00c8);
      color: white;
      cursor: pointer;
    }

    #timer {
      font-size: 20px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h2>Task 1: Gamble (1/500 Chance)</h2>
  <button id="btn1" onclick="task1()">Gamble</button>
  <div id="result"></div>

  <hr>

  <h2>Task 2: Ecsape ICE ”</h2>
  <button id="startBtn" onclick="startGame()">Start</button>
  <div id="timer"></div>
  <div id="aiResult"></div>
  <div id="gameArea"></div>

<script>

/* ===============================
   24 HOUR KEY SYSTEM
================================= */

function getCookie(name) {
  let match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
  return match ? match[2] : null;
}

function setCookie(name, value, hours) {
  let d = new Date();
  d.setTime(d.getTime() + (hours * 60 * 60 * 1000));
  document.cookie = `${name}=${value}; expires=${d.toUTCString()}; path=/; SameSite=Lax`;
}

if (!getCookie("vaultKey")) {
  setCookie("vaultKey", Math.floor(Math.random() * 100000) + 1, 24);
}

/* ===============================
   TASK 1 (UNCHANGED)
================================= */

let t1Cooldown = false;

function task1() {
  if (t1Cooldown) return;

  t1Cooldown = true;
  const btn = document.getElementById("btn1");
  const result = document.getElementById("result");

  btn.disabled = true;
  btn.innerText = "Wait 1s";

  setTimeout(() => {
    btn.disabled = false;
    btn.innerText = "Gamble";
    t1Cooldown = false;
  }, 1000);

  if (Math.floor(Math.random() * 500) === 0) {
    result.className = "heaven";
    result.innerText = `✨ YOU GOT THE KEY! (${getCookie("vaultKey")}) ✨`;
  } else {
    result.className = "trash flies";
    result.innerText = "💩 Trash… try again";
  }
}

/* ===============================
   TASK 2 CLEAN ENGINE
================================= */

let gameActive = false;
let bombTime = 120;
let cops = [];
let lastFrame = 0;
let spawnTimer = 0;
let defuseTimer = 0;
let defuseBtn = null;
let cooldownKey = "vaultCooldown";

let mouse = { x: 0, y: 0 };
let lastMouse = { x: 0, y: 0 };
let invincibleUntil = 0;

const area = document.getElementById("gameArea");

function startGame() {
  const cd = localStorage.getItem(cooldownKey);
  if (cd && Date.now() < cd) {
    document.getElementById("aiResult").innerText =
      "⏳ Wait before retrying!";
    return;
  }

  resetCore();

  gameActive = true;
  bombTime = 120;
  cops = [];
  spawnTimer = 0;

  area.style.display = "block";

  lastFrame = performance.now();
  requestAnimationFrame(gameLoop);
  spawnDefuse();
}

function spawnCop() {
  const el = document.createElement("div");
  el.className = "cop";
  el.style.left = Math.random() * 760 + "px";
  el.style.top = Math.random() * 410 + "px";
  area.appendChild(el);

  cops.push({
    el,
    x: el.offsetLeft,
    y: el.offsetTop,
    stunned: false,
    stunUntil: 0,
    spawnTime: performance.now()
  });
}

function spawnDefuse() {
  if (!gameActive) return;

  if (defuseBtn) defuseBtn.remove();

  defuseBtn = document.createElement("button");
  defuseBtn.className = "defuseBtn";
  defuseBtn.innerText = "DEFUSE";
  defuseBtn.style.left = Math.random() * 700 + "px";
  defuseBtn.style.top = Math.random() * 350 + "px";

  area.appendChild(defuseBtn);

  defuseTimer = performance.now();

  defuseBtn.onclick = () => {
    defuseBtn.remove();
    defuseBtn = null;
    setTimeout(spawnDefuse, 2000);
  };
}

document.addEventListener("mousemove", e => {
  const rect = area.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
});

function gameLoop(now) {
  if (!gameActive) return;

  const delta = (now - lastFrame) / 1000;
  lastFrame = now;

  bombTime -= delta;
  document.getElementById("timer").innerText =
    "Time: " + Math.max(0, Math.floor(bombTime));

  if (bombTime <= 0) return winGame();

  spawnTimer += delta;
  if (spawnTimer >= 9) {
    spawnTimer = 0;
    spawnCop();
  }

  if (defuseBtn && now - defuseTimer > 5000) {
    return resetGame("💥 You hesitated!");
  }

  updateCops(delta, now);

  requestAnimationFrame(gameLoop);
}

function updateCops(delta, now) {
  const moveSpeed = Math.hypot(mouse.x - lastMouse.x, mouse.y - lastMouse.y);

  cops.forEach(c => {

    if (now - c.spawnTime < 300) return;

    if (c.stunned && now > c.stunUntil) {
      c.stunned = false;
      c.el.classList.remove("stunned");
    }

    const cx = c.x + 14;
    const cy = c.y + 14;

    const dx = mouse.x - cx;
    const dy = mouse.y - cy;
    const dist = Math.hypot(dx, dy);

    if (dist < 20 && now > invincibleUntil) {
      return loseGame();
    }

    if (!c.stunned && dist < 55 && moveSpeed > 28) {
      c.stunned = true;
      c.stunUntil = now + 1500;
      c.el.classList.add("stunned");
      invincibleUntil = now + 300;
    }

    if (!c.stunned && dist > 0) {
      const baseSpeed = 280;
      const difficultyBoost = (120 - bombTime) * 2;
      const speed = (baseSpeed + difficultyBoost) * delta;

      c.x += (dx / dist) * speed;
      c.y += (dy / dist) * speed;

      c.el.style.left = c.x + "px";
      c.el.style.top = c.y + "px";
    }
  });

  lastMouse.x = mouse.x;
  lastMouse.y = mouse.y;
}

function winGame() {
  const key = getCookie("vaultKey");
  resetCore();
  document.getElementById("aiResult").innerText =
    "🌟 Vault Opened! KEY: " + key;
}

function loseGame() {
  localStorage.setItem(cooldownKey, Date.now() + 60000);
  resetGame("👮 Caught! 1 minute cooldown.");
}

function resetGame(msg) {
  resetCore();
  document.getElementById("aiResult").innerText = msg;
}

function resetCore() {
  gameActive = false;
  cops = [];
  area.innerHTML = "";
  area.style.display = "none";
  document.getElementById("timer").innerText = "";
  defuseBtn = null;
}

</script>

</body>
</html>
